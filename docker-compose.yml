services:

  baseline:
    build: ./baseline
    volumes:
      - /workspace/models:/models
      - ./baseline:/app
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm:
    image: vllm/vllm-openai:latest
    volumes:
      - /workspace/models:/models
    ports:
      - "8002:8000"
    command: >
      --model /models/Meta-Llama-3-8B-Instruct
      --dtype float16
      --max-model-len 4096
      --gpu-memory-utilization 0.9
      --max-num-seqs 256
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sglang:
    image: lmsysorg/sglang:latest
    volumes:
      - /workspace/models:/models
    ports:
      - "8004:8000"
    command: >
      python -m sglang.launch_server
      --model-path /models/Meta-Llama-3-8B-Instruct
      --dtype float16
      --max-total-tokens 4096
      --max-num-reqs 256
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]